#
#	install-user-tasks.yml
#Wed Oct 16 09:50:04 PM CEST 2024
---
#
#	Vars:
#       user
#       global_install_folder

- set_fact:
    install_user: "{{ user.name }}"
    install_group: "{{ user.group | default(user.name) }}"

- name: "[install-user-tasks]] Create group for user {{ install_group }}"
  group: name={{ install_group }}

- name: "[install-user-tasks] Create User {{ user.name }}"
  user:
    name: "{{ install_user }}"
    group: "{{ install_group }}"
    groups: "{{ user.groups | default([]) }}"
    append: true
    generate_ssh_key: "{{ user.ssh_key is defined and user.ssh_key }}"
    ssh_key_type: "{{ user.ssh_key_type | default('rsa') }}"
    ssh_key_bits: "{{ user.ssh_key_size | default('4096') }}"
  when: not ( user.name == 'root' )

- name: "[install-user-tasks] definitions user={{ install_user }} group={{ install_group }} {Level: 5}"
  include_tasks: common-user-definitions.yml

- name: "[install-user-tasks] dir for files fetched from {{ inventory_hostname }} {Level: 5}"
  file:
    path: "{{ ansible_home }}/files/byfile/{{ inventory_hostname }}_{{ install_user }}/"
    state: directory
    owner: "{{ ansible_control_user }}"
    group: "{{ ansible_control_user }}"
    mode: "0750"
  delegate_to: localhost

- name: "[install-user-tasks] fetch ssh public key {{ user.name }} {Level: 4}"
  become: true
  become_user: "{{ install_user }}"
  fetch:
    src: "{{ item }}"
    dest: "{{ ansible_home }}/files/byfile/{{ inventory_hostname }}_{{ install_user }}/"
    fail_on_missing: false
    flat: true
  loop: [ "{{ install_home }}/.ssh/id_rsa.pub", "{{ install_home }}/.ssh/id_ecdsa.pub" ]
  when: install_user != 'root' and user.ssh_key is defined and user.ssh_key


