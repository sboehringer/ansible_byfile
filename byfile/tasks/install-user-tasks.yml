# install admin ssh public key from 'files/byfile/ssh/admin.pub'
- name: "Authorized_key {{ install_user }} {Level: 4}"
  authorized_key:
    user: "{{ install_user }}"
    key: "{{ lookup('file', ansible_home + '/files/byfile/ssh/admin.pub') }}"
  when: user.authorized_key is defined and user.authorized_key

#
#   <p> generic all users on all hosts
#
- { stat: { path: "{{ global_install_folder }}/user:*" }, delegate_to: localhost, register: ufgg }
#- debug: { msg: "path: {{ global_install_folder }}/generic/users status: {{ ufgg }}" }
- name: "Std Folders all hosts all users {{ global_install_folder }}/user:*"
  include_tasks: task-taskFolder.yml
  vars:
    path: "{{ global_install_folder }}/user:*"
    service_user: "{{ user.name }}"
    template_vars: "{{ user.template_vars | default({}) | combine({ 'user_name': user.name, 'user_home': current_home, 'user_uid': current_uid }) }}"
  tags: [ generic_igh ]
  when: ufgg.stat.exists

#
#   <p> generic all users on host
#
- { stat: { path: "{{ global_install_folder }}/host:{{ inventory_hostname }}/user:*" }, delegate_to: localhost, register: ufg }
- name: "[install-user-tasks] Std Folders this hosts all users {{ global_install_folder }}/hosts/{{ inventory_hostname }}/user:*"
  include_tasks: task-taskFolder.yml
  vars:
    path: "{{ global_install_folder }}/host:{{ inventory_hostname }}/user:*"
    service_user: "{{ user.name }}"
    template_vars: "{{ user.template_vars | default({}) | combine({ 'user_name': user.name, 'user_home': current_home, 'user_uid': current_uid }) }}"
  tags: [ generic_igh ]
  when: ufg.stat.exists

#
#   <p> user specific standard folder
#
- { stat: { path: "{{ global_install_folder }}/host:{{ inventory_hostname }}/user:{{ user.name }}" }, delegate_to: localhost, register: ufs }
- debug: { msg: "Path {{ global_install_folder }}/host:{{ inventory_hostname }}/user:{{ user.name }} exists: {{ ufs.stat.exists }}" }
- name: "[install-user-tasks] Std Folders this hosts this user {{ global_install_folder }}/hosts/{{ inventory_hostname }}/users/{{ user.name }}"
  include_tasks: task-taskFolder.yml
  vars:
    path: "{{ global_install_folder }}/host:{{ inventory_hostname }}/user:{{ user.name }}"
    service_user: "{{ user.name }}"
    template_vars: "{{ user.template_vars | default({}) | combine({ 'user_name': user.name, 'user_home': current_home, 'user_uid': current_uid }) }}"
  tags: [ generic_igh ]
  when: ufs.stat.exists
