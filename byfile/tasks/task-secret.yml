#   task-secret.yml
#Tue Nov 12 10:20:38 PM CET 2024
---

# <A> local_control_user has to be set in hosts to the local conrolling user

# Vars:
#   path
- include_tasks: common-pathDecompose.yml

#   secret_key: key to retrieve
#   secret_attribute: attribute to retrieve, defaults to password

#   <p> Install key
#   secret-tool store --label somelabel 'secret_key' secret_value|default
#   Example: secret-tool store --label ansible ansible/backup.host.test password
#
#   <p> Retrieve
#   secret-tool lookup ansible/backup.host.test password

- name: "[task-secret] key={{ secret_key }} attribute={{ secret_attribute }}"
  shell: "secret-tool lookup ansible/{{ secret_key | regex_replace('[$]HOST', inventory_hostname) | regex_replace('[$]USER', install_user) }} {{ secret_attribute }}"
  connection: local
  become: True
  become_user: "{{ ansible_control_user }}"
  register: secretraw

- set_fact: { install_secret: "{{ secretraw.stdout }}" }
